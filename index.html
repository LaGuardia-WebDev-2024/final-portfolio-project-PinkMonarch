      /*~~~~~ Taken From:

      .parallax {
        /* The image used */
        background-image: url("CS_Ed_Week_2025.jpg");

        /* Set a specific height */
        min-height: 500px;

        /* Create the parallax scrolling effect */

      .image-container{

      .hotspot {
        position:absolute;

        top:40%;
        left:50%;

        width:120px;
        height:120px;

        transform:translate(-50%, -50%);
      }
    
    
      .popup-text{
        position:absolute;
        top:-50px;
        left:1%;

        transform:translateX(-50%) scale(0.5);

          color:rgb(238, 54, 198);

          padding:10px 15px;
          border-radius:10px;

          font-size:20px;
      
          opacity:0;

          transition:0.2s;
          white-space:nowrap;
        }

    
        .hotspot:hover .popup-text{
          opacity:1;
          transform:translateX(-90%) scale(1.2);
        }
    
        .cute {
          column-count: 2;

        }
    
        .cute img {

          margin-bottom: 20px;
          border-radius: 15px;

        }
    
        .cute img:hover {

        }
    
    

        .center-text {
          position: absolute;
          top: 30%;
          left: 0%;
          transform: transform: translate(-50%, -50%);
          
          color:hotpink

        }
